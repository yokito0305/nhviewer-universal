name: flutter-workflow-ipa

on:
  workflow_dispatch:

jobs:
  build-ios-unsigned:
    runs-on: macos-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: 3.41.5

      - name: Install dependencies
        run: flutter pub get

      - name: Generate database code
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Build iOS (unsigned)
        run: |
          rm -rf Payload nhviewer-ios-unsigned.ipa
          flutter build ios --release --no-codesign
          mkdir Payload
          cp -R build/ios/iphoneos/Runner.app Payload/
          ditto -c -k --sequesterRsrc --keepParent Payload nhviewer-ios-unsigned.ipa

      - name: Upload unsigned IPA
        uses: actions/upload-artifact@v4
        with:
          name: nhviewer-ios-unsigned
          path: nhviewer-ios-unsigned.ipa
          if-no-files-found: error
